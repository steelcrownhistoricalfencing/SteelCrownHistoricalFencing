site_name: Steel Crown Historical Fencing
site_description: Historical European Martial Arts in Charlotte, NC
site_url: https://steelcrownhistoricalfencing.com/
docs_dir: 'Steel Crown Historical Fencing'
site_dir: site
exclude_docs: |
  Fiore for HEMA Fencers/Fiore Di Libre Lesson*

theme:
  name: material
  palette:
    - scheme: default
      primary: brown
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
