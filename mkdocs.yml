site_name: Steel Crown Historical Fencing
site_description: Historical European Martial Arts in Charlotte, NC
site_url: https://steelcrownhistoricalfencing.com/
docs_dir: 'Steel Crown Historical Fencing'
site_dir: site

theme:
  name: material
  logo: assets/Logo.png
  favicon: assets/Logo.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: black
      accent: light-blue
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.indexes

    - navigation.top
    - navigation.instant
    - search.highlight
    - search.share
    - navigation.prune

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - assets/js/traditions-interactive.js

nav:
